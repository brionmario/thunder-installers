name: 🚀 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - thunderid
        default: thunderid
      bump_type:
        description: 'Version bump type (major, minor, or patch)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    name: 📦 Publish ${{ github.event.inputs.package || 'thunderid' }} (${{ github.event.inputs.bump_type || 'patch' }} bump)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: latest

      - name: 🗂️ Resolve Package Directory
        id: pkg
        run: |
          PACKAGE="${{ github.event.inputs.package || 'thunderid' }}"
          case "$PACKAGE" in
            thunderid) DIR="npx-thunderid" ;;
            *) DIR="$PACKAGE" ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "name=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: 📝 Calculate Next Version
        id: version
        run: |
          CURRENT=$(node -p "require('./${{ steps.pkg.outputs.dir }}/package.json').version")
          if [[ $CURRENT =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            echo "❌ Could not parse current version: $CURRENT"
            exit 1
          fi
          case "${{ github.event.inputs.bump_type || 'patch' }}" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "✅ $CURRENT → $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Bump Version and Install
        run: |
          cd "${{ steps.pkg.outputs.dir }}"
          npm version "${{ steps.version.outputs.value }}" --no-git-tag-version
          pnpm install --frozen-lockfile

      - name: 🔨 Build
        run: |
          cd "${{ steps.pkg.outputs.dir }}"
          pnpm build

      - name: 🚀 Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd "${{ steps.pkg.outputs.dir }}"
          pnpm publish --access public --no-git-checks

      - name: 📝 Commit and Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            "${{ steps.pkg.outputs.dir }}/package.json" \
            "${{ steps.pkg.outputs.dir }}/pnpm-lock.yaml"
          git commit -m "chore: release ${{ steps.pkg.outputs.name }} v${{ steps.version.outputs.value }}"
          git tag "${{ steps.pkg.outputs.name }}-v${{ steps.version.outputs.value }}"
          git push
          git push --tags
